# Role/title keyword tiers for contact discovery, highest priority first.
# The contact finder searches Tier 1 first and only falls back to lower
# tiers if nothing is found — this is what keeps enrichment costs down.

- name: "Tier 1 — Procurement / Packaging Buyer"
  keywords:
    - procurement
    - purchasing
    - buyer
    - sourcing
    - category manager
    - commodity manager
    - packaging
    - raw materials
    - materials manager
    - supplier management
    - vendor management
    - cpo

- name: "Tier 2 — Executive / Supply Chain / Commercial"
  keywords:
    - ceo
    - coo
    - cfo
    - founder
    - owner
    - president
    - vice president
    - general manager
    - director
    - head of
    - supply chain
    - operations
    - business development
    - planning
    - logistics
    - sales
    - commercial
