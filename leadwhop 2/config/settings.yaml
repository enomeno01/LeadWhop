# LeadWhop settings — safe to commit (no secrets here).

models:
  llm: gpt-4o-mini
  temperature: 0.0

search:
  serper_url: https://google.serper.dev/search
  results_count: 5

rate_limits:
  sleep_between_calls: 0.5      # seconds between LLM/search calls
  sleep_between_companies: 1.5  # seconds between Lusha company lookups
  max_retries: 3

pipeline:
  checkpoint_every: 5           # autosave interval (rows)
  cache_dir: .cache
  output_dir: outputs
  max_contacts_per_company: 2

# --- ICP (Ideal Customer Profile) qualification -------------------------
# Edit this block to point the pipeline at YOUR market. The example below
# is the original production use case: glass packaging sales.
icp:
  question: >
    Is this company a manufacturer, and are its products typically packaged
    or consumed in GLASS containers (bottles, jars)?
  positive_label: "Yes"
  negative_label: "No"
  note_instruction: >
    In one short English sentence, state what the company makes and which of
    its products could use glass packaging.

# Domains that are never a company's official website
domain_blacklist:
  - linkedin.com
  - facebook.com
  - instagram.com
  - x.com
  - twitter.com
  - youtube.com
  - wikipedia.org
  - amazon.com
  - alibaba.com
  - made-in-china.com
  - crunchbase.com
  - bloomberg.com
  - zoominfo.com
  - yelp.com
  - glassdoor.com

# --- Verification (hybrid) ----------------------------------------------
verification:
  # Websites below this confidence get a homepage content check before
  # they are trusted (and before any enrichment credits are spent).
  content_check_below: high        # check anything that's not "high"
  fetch_timeout: 10
  # Company-name similarity threshold for accepting name-based Lusha
  # matches (0-1). Below this, the contact is rejected and flagged.
  fuzzy_threshold: 0.6
