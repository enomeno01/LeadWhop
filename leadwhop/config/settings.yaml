# --- Country -> TLD map for Lusha domain variant search -------------------
# When the found domain yields no Lusha results, TLD variants are tried
# BEFORE falling back to name search: original -> .com -> country TLD.
# Searches are free on Lusha (only enrich costs credits), so trying
# variants is pure upside.
country_tlds:
  germany: de
  france: fr
  italy: it
  spain: es
  netherlands: nl
  greece: gr
  portugal: pt
  austria: at
  switzerland: ch
  belgium: be
  ireland: ie
  poland: pl
  sweden: se
  denmark: dk
  norway: "no"
  finland: fi
  turkey: com.tr
  "united kingdom": co.uk
  "united states": com
  canada: ca
  australia: com.au
  japan: co.jp
  china: com.cn
  brazil: com.br
  mexico: com.mx
