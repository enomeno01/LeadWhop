# LeadWhop settings — safe to commit (no secrets here).

models:
  llm: gpt-4o-mini
  temperature: 0.0

search:
  serper_url: https://google.serper.dev/search
  results_count: 5
  gl: us
  hl: en

rate_limits:
  sleep_between_calls: 0.5
  sleep_between_companies: 1.5
  sleep_between_tiers: 1.0
  sleep_before_enrich: 1.0
  max_retries: 3

pipeline:
  checkpoint_every: 5
  cache_dir: .cache
  output_dir: outputs
  max_contacts_per_company: 2

# --- ICP qualification ---
icp:
  question: >
    Is this company a manufacturer, and are its products typically packaged
    or consumed in GLASS containers (bottles, jars)?
  positive_label: "Yes"
  negative_label: "No"
  note_instruction: >
    In one short English sentence, state what the company makes and which of
    its products could use glass packaging.

# --- Website verification ---
verification:
  fetch_timeout: 10
  fuzzy_threshold: 0.6

# Domains that are NEVER a company's official website
