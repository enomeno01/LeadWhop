# LeadWhop settings — safe to commit (no secrets here).

models:
  # gpt-4.1-mini: markedly better judgement than gpt-4o-mini on the ICP
  # decision tree, at roughly +$0.60 per 1,000 companies. The long rule block
  # in the qualify prompt is a stable prefix, so prompt caching absorbs most
  # of the input cost on repeat runs.
  # Cheaper fallback: gpt-4.1-nano. Higher accuracy: gpt-4.1.
  #
  # Two tiers:
  #   llm       -> judgement work: ICP fit, website identification,
  #                company sizing estimates, email copy.
  #   llm_cheap -> mechanical work: picking one value from a fixed
  #                picklist (Function, Industry, Sub-Industry, Level).
  #                Short prompts, closed answer set, heavily cached.
  # Set llm_cheap to the same value as llm to disable the split.
  llm: gpt-4.1-mini
  llm_cheap: gpt-4.1-nano
  temperature: 0.0

search:
  serper_url: https://google.serper.dev/search
  results_count: 5
  gl: us
  hl: en

rate_limits:
  sleep_between_calls: 0.5
  sleep_between_companies: 1.5
  sleep_between_tiers: 1.0
  sleep_before_enrich: 1.0
  max_retries: 3

pipeline:
  checkpoint_every: 5
  cache_dir: .cache
  output_dir: outputs
  max_contacts_per_company: 2

# --- ICP qualification ---
icp:
  question: >
    Is this company a manufacturer, and are its products typically packaged
    or consumed in GLASS containers (bottles, jars)?
  positive_label: "Yes"
  negative_label: "No"
  note_instruction: >
    In one short English sentence, state what the company makes and which of
    its products could use glass packaging.

# --- Website verification ---
verification:
  fetch_timeout: 10
  fuzzy_threshold: 0.6

